<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdorLipi - Smart Banglish to Bangla Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FF3366" />
                            <stop offset="100%" stop-color="#FF9933" />
                        </linearGradient>
                    </defs>
                    <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-1.22-1.8A2 2 0 0 0 8.53 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>
                    <path d="M12 10v6"></path>
                    <path d="M9 13h6"></path>
                </svg>
                <h1>Ador<span>Lipi</span></h1>
            </div>
            <p class="subtitle">Next-Level Banglish Transliteration Engine</p>
        </header>

        <main>
            <div class="editor-wrap">
                <div class="pane input-pane">
                    <div class="pane-header">
                        <span class="dot"></span>
                        <h3>Banglish Input</h3>
                    </div>
                    <textarea id="input-text" placeholder="Type Banglish here (e.g., kemon acho...)" spellcheck="false" disabled></textarea>
                </div>

                <div class="pane output-pane">
                    <div class="pane-header">
                        <span class="dot highlight"></span>
                        <h3>Bangla Output</h3>
                        <button id="copy-btn" class="action-btn" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                    <!-- Using readonly textarea so it can be easily copied -->
                    <textarea id="output-text" readonly placeholder="Output will appear here..."></textarea>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="status">
                <div id="loading-indicator">
                    <div class="spinner"></div> Loading Engine Data...
                </div>
                <div id="ready-indicator" class="hidden">
                    <span class="pulse-dot"></span> Engine Active
                </div>
            </div>
        </footer>
    </div>

    <script src="js/engine.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
